<!DOCTYPE html>
<html>
<head>
  <title>Bike Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Bike Store</h1>
</header>

<section class="products">
  <div class="card">
    <h2>Yamaha R15</h2>
    <p>₹2,20,000</p>
    <button onclick="addToCart('Yamaha R15')">Buy</button>
  </div>

  <div class="card">
    <h2>KTM Duke 390</h2>
    <p>₹3,10,000</p>
    <button onclick="addToCart('KTM Duke 390')">Buy</button>
  </div>

  <div class="card">
    <h2>Royal Enfield Classic 350</h2>
    <p>₹2,20,000</p>
    <button onclick="addToCart('RE 350')">Buy</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
